<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 300px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box button {
            padding: 12px 30px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #ff5252;
        }

        .current-weather {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .city-name {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .date-time {
            color: #666;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 80px;
            margin: 20px 0;
        }

        .temperature {
            font-size: 64px;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .weather-description {
            font-size: 24px;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 30px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .detail-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 20px;
            color: #333;
            font-weight: bold;
        }

        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .forecast-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .forecast-day {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 40px;
            margin: 10px 0;
        }

        .forecast-temp {
            color: #667eea;
            font-weight: bold;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
        }

        .section-title {
            color: white;
            font-size: 20px;
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                autocomplete="off"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">Loading weather data...</div>

        <div id="currentWeather" class="current-weather" style="display: none;">
            <div class="city-name" id="cityName"></div>
            <div class="date-time" id="dateTime"></div>
            <div class="weather-icon" id="weatherIcon"></div>
            <div class="temperature" id="temperature"></div>
            <div class="weather-description" id="description"></div>
            <div class="weather-details" id="weatherDetails"></div>
        </div>

        <div id="forecastSection" style="display: none;">
            <div class="section-title">5-Day Forecast</div>
            <div class="forecast" id="forecast"></div>
        </div>
    </div>

    <script>
        // OpenWeatherMap API Key (Free tier)
        const API_KEY = 'b6fd43b51ba62d77e4a2158735e11efb';
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';

        // Weather icon mapping
        const weatherIcons = {
            '01d': '☀️',
            '01n': '🌙',
            '02d': '⛅',
            '02n': '🌤️',
            '03d': '☁️',
            '03n': '☁️',
            '04d': '☁️',
            '04n': '☁️',
            '09d': '🌧️',
            '09n': '🌧️',
            '10d': '🌦️',
            '10n': '🌧️',
            '11d': '⛈️',
            '11n': '⛈️',
            '13d': '❄️',
            '13n': '❄️',
            '50d': '🌫️',
            '50n': '🌫️'
        };

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('currentWeather').style.display = 'none';
            document.getElementById('forecastSection').style.display = 'none';
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function getWeatherIcon(iconCode) {
            return weatherIcons[iconCode] || '🌤️';
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatDayName(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('en-US', { weekday: 'short' });
        }

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }

            showLoading();

            try {
                // Fetch current weather
                const currentResponse = await fetch(
                    `${BASE_URL}/weather?q=${city}&units=metric&appid=${API_KEY}`
                );

                if (!currentResponse.ok) {
                    if (currentResponse.status === 404) {
                        throw new Error('City not found');
                    }
                    throw new Error('Failed to fetch weather data');
                }

                const currentData = await currentResponse.json();

                // Fetch 5-day forecast
                const forecastResponse = await fetch(
                    `${BASE_URL}/forecast?q=${city}&units=metric&appid=${API_KEY}`
                );

                if (!forecastResponse.ok) {
                    throw new Error('Failed to fetch forecast data');
                }

                const forecastData = await forecastResponse.json();

                displayCurrentWeather(currentData);
                displayForecast(forecastData);
                hideLoading();
            } catch (error) {
                hideLoading();
                showError(error.message);
            }
        }

        function displayCurrentWeather(data) {
            const { main, weather, wind, clouds, sys } = data;
            const iconCode = weather[0].icon;

            document.getElementById('cityName').textContent = 
                `${data.name}, ${data.sys.country}`;
            
            document.getElementById('dateTime').textContent = 
                formatDate(data.dt);
            
            document.getElementById('weatherIcon').textContent = 
                getWeatherIcon(iconCode);
            
            document.getElementById('temperature').textContent = 
                `${Math.round(main.temp)}°C`;
            
            document.getElementById('description').textContent = 
                weather[0].description;

            // Weather details
            const detailsHTML = `
                <div class="detail-card">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value">${Math.round(main.feels_like)}°C</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value">${main.humidity}%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value">${main.pressure} mb</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value">${wind.speed} m/s</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Clouds</div>
                    <div class="detail-value">${clouds.all}%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">UV Index</div>
                    <div class="detail-value">${data.visibility / 1000} km</div>
                </div>
            `;

            document.getElementById('weatherDetails').innerHTML = detailsHTML;
            document.getElementById('currentWeather').style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function displayForecast(data) {
            const forecasts = data.list.filter((item, index) => index % 8 === 0);
            
            let forecastHTML = '';
            forecasts.slice(0, 5).forEach(forecast => {
                const iconCode = forecast.weather[0].icon;
                forecastHTML += `
                    <div class="forecast-card">
                        <div class="forecast-day">${formatDayName(forecast.dt)}</div>
                        <div class="forecast-icon">${getWeatherIcon(iconCode)}</div>
                        <div style="margin: 10px 0; color: #666; font-size: 12px; text-transform: capitalize;">
                            ${forecast.weather[0].description}
                        </div>
                        <div class="forecast-temp">
                            ${Math.round(forecast.main.temp_max)}° / ${Math.round(forecast.main.temp_min)}°
                        </div>
                    </div>
                `;
            });

            document.getElementById('forecast').innerHTML = forecastHTML;
            document.getElementById('forecastSection').style.display = 'block';
        }

        // Allow Enter key to search
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeather();
        });

        // Load default city on page load
        window.addEventListener('load', () => {
            document.getElementById('cityInput').value = 'London';
            searchWeather();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSE Puzzle Game - Safety Smart Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- User Registration Form -->
    <div id="registration-screen" class="screen active">
      <h1>🧩 Safety Smart Challenge</h1>
      <h3>Enter your details to start the game</h3>
      <form id="userForm">
        <input type="text" id="fullName" placeholder="Full Name" required>
        <input type="text" id="designation" placeholder="Designation / Job Role" required>
        <input type="text" id="company" placeholder="Company Name" required>
        <input type="tel" id="phone" placeholder="Contact Number" required>
        <button type="submit" class="btn">Start Game</button>
      </form>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div class="header-info">
        <p>Player: <span id="playerName"></span> | <span id="playerCompany"></span></p>
        <p>Score: <span id="score">0</span></p>
      </div>

      <div id="level-container">
        <h2 id="level-title"></h2>
        <div id="puzzle-content"></div>
        <div id="feedback" class="feedback"></div>
      </div>

      <div class="navigation">
        <button id="prevBtn" class="btn" style="display:none;">Previous</button>
        <button id="nextBtn" class="btn">Next Level</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <h2>🎉 Game Completed!</h2>
      <p>Congratulations <span id="finalName"></span>!</p>
      <p>Your Final Score: <span id="finalScore"></span>/100</p>
      <p>You have successfully demonstrated your HSE knowledge.</p>
      <button id="downloadCert" class="btn">Download Certificate</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
